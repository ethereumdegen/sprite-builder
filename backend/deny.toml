# cargo-deny configuration (enforcement; see /enforcement/README.md).
# Run with: cargo deny check

[advisories]
version = 2
yanked = "deny"
ignore = []

[bans]
multiple-versions = "warn"
wildcard-dependencies = "deny"
# ADR 0002 / 0015 — SQLx is the only DB access layer. Ban general-purpose ORMs
# and raw drivers so they can't creep in.
deny = [
    { name = "diesel" },
    { name = "sea-orm" },
    { name = "rusqlite" },
    { name = "postgres" },
    { name = "tokio-postgres" },
    { name = "mysql" },
]

[licenses]
version = 2
# Permissive licenses we accept across the dependency tree.
allow = [
    "MIT",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "Unicode-3.0",
    "Unicode-DFS-2016",
    "Zlib",
    "MPL-2.0",
    "CC0-1.0",
    "OpenSSL",
]
confidence-threshold = 0.8

[sources]
unknown-registry = "deny"
unknown-git = "deny"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
